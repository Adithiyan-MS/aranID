<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Identity Hub - The Archive</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .launchpad-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-top: 4rem;
        }

        .product-card {
            background: var(--paper);
            border: 1.5px solid var(--border);
            padding: 2.5rem;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            text-decoration: none;
            color: var(--ink);
        }

        .product-card:hover {
            border-color: var(--ink);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        .product-card .icon {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            font-family: 'Crimson Pro', serif;
            font-style: italic;
        }

        .user-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 4rem;
            border-bottom: 1px solid var(--border);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--ink);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
    </style>
</head>
<body style="display: block;" data-page="dashboard">
    <nav class="user-nav">
        <div class="logo" style="font-size: 1.5rem;">[ ATELIER ]</div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <span id="usernameDisplay" data-user="username" style="font-weight: 500;">...</span>
            <div class="avatar" id="userInitial" data-user-initial>?</div>
            <button id="logoutBtn" style="padding: 0.5rem 1rem; font-size: 0.8rem; width: auto; margin: 0;">LOGOUT</button>
        </div>
    </nav>

    <main style="padding: 4rem;">
        <header style="max-width: 800px; margin: 0 auto; text-align: center;">
            <h1 style="font-size: 3rem;">Your Digital Headquarters.</h1>
            <p class="subtitle">Select a product to continue your work.</p>
        </header>

        <div class="launchpad-grid" style="max-width: 1000px; margin: 4rem auto 0;">
            <a href="thoothu.html" class="product-card">
                <div class="icon">Th</div>
                <h3>Thoothu</h3>
                <p style="font-size: 0.8rem; color: var(--clay); margin-top: 10px;">Secure Messaging</p>
            </a>

            <a href="archives.html" class="product-card">
                <div class="icon">Ar</div>
                <h3>Archives</h3>
                <p style="font-size: 0.8rem; color: var(--clay); margin-top: 10px;">Intentional Storage</p>
            </a>

            <a href="settings.html" class="product-card">
                <div class="icon">Se</div>
                <h3>Identity</h3>
                <p style="font-size: 0.8rem; color: var(--clay); margin-top: 10px;">Security & Profile</p>
            </a>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
