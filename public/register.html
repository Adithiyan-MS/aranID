<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Archive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="side-panel">
        <div class="logo"><span style="font-family: 'IBM Plex Mono'; font-weight: 600;">[ARCHIVE]</span></div>
        <div class="brand-quote">
            <h2>Create your digital identity.</h2>
        </div>
    </div>

    <div class="auth-section">
        <div class="auth-container">
            <h1>Register</h1>
            <p class="subtitle">Join the ecosystem.</p>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="johndoe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Min. 6 characters" required>
                </div>
                <button type="submit">Create Account</button>
            </form>

            <div style="margin-top: 30px; text-align: center;">
                <a href="index.html" style="color: #888; font-size: 0.85rem; text-decoration: underline;">Already have an account? Sign in</a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
