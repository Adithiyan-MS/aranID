<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive - Identity Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #auth-content {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .fade-out { opacity: 0; transform: translateY(10px); }
        .fade-in { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="visual-panel">
            <div class="logo"><span>[ ATELIER ]</span></div>
            <div class="hero-art" aria-hidden="true">
                <div class="hero-art__shape hero-art__shape--large"></div>
                <div class="hero-art__shape hero-art__shape--small"></div>
            </div>
            <h2 id="hero-text">The best way to predict the future is to create it.</h2>
        </div>

        <div class="auth-panel">
            <div class="auth-form-box" id="auth-content"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
