<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thoothu - The Archive</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: block; }
        .shell { max-width: 900px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }
        .panel { border: 1px solid var(--border); background: #fff; padding: 2rem; }
    </style>
</head>
<body data-page="thoothu">
    <div class="shell">
        <p><a href="dashboard.html" style="color: var(--clay); text-decoration:none;">Back to dashboard</a></p>
        <div class="panel">
            <h1>Thoothu</h1>
            <p class="subtitle">Signed in as <strong data-user="username">...</strong>.</p>
            <p>This workspace is reserved for secure messaging. The dashboard card now routes to a real page instead of a dead link.</p>
            <button id="logoutBtn" style="width:auto;">LOGOUT</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
