<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Identity - Archive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="side-panel">
        <div class="logo"><span style="font-family: 'IBM Plex Mono'; font-weight: 600;">[ARCHIVE]</span></div>
        <div class="brand-quote">
            <h2>Almost there. Confirm your email.</h2>
        </div>
    </div>

    <div class="auth-section">
        <div class="auth-container">
            <h1>Verify</h1>
            <p class="subtitle">Enter the 6-digit code sent to your email.</p>

            <form id="verifyForm">
                <input type="hidden" id="email" name="email">
                <div class="form-group">
                    <label for="otp">One-Time Password</label>
                    <input type="text" id="otp" name="otp" placeholder="123456" maxlength="6" style="letter-spacing: 0.5em; text-align: center; font-size: 1.5rem;" required>
                </div>
                <button type="submit">Verify & Sign In</button>
            </form>
            <p class="subtitle" id="verifyEmailHint" style="margin-top: 20px; margin-bottom: 0;">Waiting for email context...</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
